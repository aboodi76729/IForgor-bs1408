name: NDK build

env:
  module_id: iforgor
  qmodName: IForgor

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        name: Checkout
        with:
          submodules: true
          lfs: true

      - uses: seanmiddleditch/gha-setup-ninja@v4

      - name: Create ndkpath.txt
        run: echo "$ANDROID_NDK_LATEST_HOME" > ${GITHUB_WORKSPACE}/ndkpath.txt

      - name: Install QPM
        run: |
          wget -q https://github.com/QuestPackageManager/QPM.CLI/releases/download/v1.5.9/qpm-linux-x64.zip -O /tmp/qpm.zip
          cd /tmp && unzip -q qpm.zip
          chmod +x /tmp/qpm
          sudo mv /tmp/qpm /usr/local/bin/qpm
          qpm --version

      - name: QPM Restore
        run: qpm restore

      - name: QPM Collapse
        run: qpm collapse

      - name: Build
        run: qpm s build

      - name: Package qmod manually
        run: |
          echo "=== Locating built files ==="
          find . -name "libiforgor.so" -not -path "*/debug/*" | head -5
          find . -name "libbeatsaber-hook.so" | head -5

          SO_FILE=$(find ./build -maxdepth 1 -name "libiforgor.so" | head -1)
          BSH_FILE=$(find . -name "libbeatsaber-hook.so" -not -path "*/debug/*" | head -1)

          echo "SO: $SO_FILE"
          echo "BSH: $BSH_FILE"

          mkdir -p qmod_staging
          cp "$SO_FILE" qmod_staging/libiforgor.so

          # Update mod.json with actual library file name
          python3 -c "
          import json
          with open('mod.json') as f:
              m = json.load(f)
          print('libraryFiles:', m.get('libraryFiles'))
          print('lateModFiles:', m.get('lateModFiles'))
          "

          if [ -n "$BSH_FILE" ]; then
            cp "$BSH_FILE" qmod_staging/libbeatsaber-hook.so
          fi

          cp mod.json qmod_staging/

          cd qmod_staging
          zip -r ../${{ env.qmodName }}.qmod .
          cd ..
          echo "Created qmod:"
          ls -la ${{ env.qmodName }}.qmod

      - name: Get Library Name
        id: libname
        run: |
          cd ./build/
          pattern="lib${module_id}*.so"
          files=( $pattern )
          echo "NAME=${files[0]}" >> $GITHUB_OUTPUT

      - name: Upload non-debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.libname.outputs.NAME }}
          path: ./build/${{ steps.libname.outputs.NAME }}
          if-no-files-found: error

      - name: Upload qmod artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{env.qmodName}}.qmod
          path: ./${{ env.qmodName }}.qmod
          if-no-files-found: error
