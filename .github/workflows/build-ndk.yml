name: NDK build

env:
  module_id: iforgor
  qmodName: IForgor

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        name: Checkout
        with:
          submodules: true
          lfs: true

      - uses: seanmiddleditch/gha-setup-ninja@v4

      - name: Create ndkpath.txt
        run: echo "$ANDROID_NDK_LATEST_HOME" > ${GITHUB_WORKSPACE}/ndkpath.txt

      - name: Install QPM
        run: |
          wget -q https://github.com/QuestPackageManager/QPM.CLI/releases/download/v1.5.9/qpm-linux-x64.zip -O /tmp/qpm.zip
          cd /tmp && unzip -q qpm.zip
          chmod +x /tmp/qpm
          sudo mv /tmp/qpm /usr/local/bin/qpm
          qpm --version

      - name: QPM Restore
        run: qpm restore

      - name: QPM Collapse
        run: qpm collapse

      - name: Build
        run: qpm s build

      - name: Package qmod
        run: |
          mkdir -p qmod_out
          cp mod.json qmod_out/
          find ./build -maxdepth 1 -name "*.so" -exec cp {} qmod_out/ \;
          find ./extern/libs -maxdepth 1 -name "*.so" -exec cp {} qmod_out/ \; 2>/dev/null || true
          echo "Files in qmod_out:"
          ls -la qmod_out/
          cd qmod_out && zip -r ../${{ env.qmodName }}.qmod . && cd ..
          ls -la ${{ env.qmodName }}.qmod

      - name: Get Library Name
        id: libname
        run: |
          cd ./build/
          pattern="lib${module_id}*.so"
          files=( $pattern )
          echo "NAME=${files[0]}" >> $GITHUB_OUTPUT

      - name: Upload non-debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.libname.outputs.NAME }}
          path: ./build/${{ steps.libname.outputs.NAME }}
          if-no-files-found: error

      - name: Upload qmod artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{env.qmodName}}.qmod
          path: ./${{ env.qmodName }}.qmod
          if-no-files-found: error
